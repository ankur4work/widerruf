# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "adda97826bd685ef1a1f3f1809c6af38"
name = "Widerruf: EU Withdrawal Button"
application_url = "https://widerruf.onkra.online/app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "REPLACE_WITH_YOUR_DEV_STORE.myshopify.com"

[webhooks]
api_version = "2024-01"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://widerruf.onkra.online/webhooks"
  customer_deletion_url = "https://widerruf.onkra.online/webhooks"
  shop_deletion_url = "https://widerruf.onkra.online/webhooks"

[access_scopes]
# read_orders: match/show order details on withdrawal.
# write_orders: PRO automation — auto-cancel unfulfilled orders + create refunds on processing.
scopes = "read_orders,write_orders"

[auth]
redirect_urls = [ "https://widerruf.onkra.online/auth/callback" ]

[app_proxy]
# Public, login-free, server-rendered withdrawal page: https://<shop>/apps/withdrawal
url = "https://widerruf.onkra.online/apps/withdrawal"
subpath = "withdrawal"
prefix = "apps"
